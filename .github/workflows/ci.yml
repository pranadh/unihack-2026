name: Monorepo CI

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/ci.yml"

jobs:
  node-projects:
    name: ${{ matrix.project }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f "${{ matrix.project }}/package-lock.json" ]; then
            npm ci --prefix "${{ matrix.project }}"
          else
            npm install --prefix "${{ matrix.project }}"
          fi

      - name: Build
        run: npm run build --prefix "${{ matrix.project }}" --if-present

      - name: Lint
        run: npm run lint --prefix "${{ matrix.project }}" --if-present
